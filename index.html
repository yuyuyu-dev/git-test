<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus · 未来视界</title>
    <style>
        :root{
            --bg1:#0a0e27;
            --bg2:#1a1f3a;
            --bg3:#2d3561;
            --accent-primary: 200, 100%, 60%;
            --accent-secondary: 280, 100%, 60%;
            --accent-tertiary: 50, 100%, 60%;
        }
        
        * { box-sizing: border-box; }
        html, body { height:100%; margin:0; padding:0; }
        
        body {
            background: radial-gradient(ellipse at 10% 10%, rgba(100,200,255,0.1), transparent 15%), 
                        radial-gradient(ellipse at 90% 90%, rgba(150,100,255,0.08), transparent 20%),
                        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
            overflow: hidden;
            color: #fff;
            font-family: 'Segoe UI', -apple-system, 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }
        
        canvas {
            display:block;
            width:100%;
            height:100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        
        /* 导航栏 */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: linear-gradient(180deg, rgba(10,14,39,0.6), rgba(10,14,39,0));
            border-bottom: 1px solid rgba(100,200,255,0.1);
        }
        
        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, hsl(200,100%,60%), hsl(280,100%,60%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            animation: glow-text 2s ease-in-out infinite;
        }
        
        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            position: relative;
            transition: color 0.3s ease;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, hsl(200,100%,60%), hsl(280,100%,60%));
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }
        
        .nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        
        .nav-links a:hover {
            color: hsl(200,100%,60%);
        }
        
        /* 主内容 */
        .hero {
            text-align: center;
            max-width: 800px;
            padding: 40px;
        }
        
        .hero-title {
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 800;
            margin: 0 0 20px 0;
            line-height: 1.2;
            background: linear-gradient(135deg, 
                hsl(200,100%,60%), 
                hsl(200,100%,70%), 
                hsl(280,100%,60%),
                hsl(50,100%,60%));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 6s ease infinite;
        }
        
        .hero-subtitle {
            font-size: clamp(16px, 3vw, 24px);
            color: rgba(255,255,255,0.6);
            margin: 0 0 30px 0;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .hero-description {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
            margin: 0 0 50px 0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 80px;
        }
        
        .btn {
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, hsl(200,100%,60%), hsl(200,100%,50%));
            color: #000;
            box-shadow: 0 8px 32px rgba(100,200,255,0.3);
        }
        
        .btn-primary:hover {
            box-shadow: 0 12px 48px rgba(100,200,255,0.5);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: hsl(200,100%,60%);
            border: 2px solid hsl(200,100%,60%);
            box-shadow: 0 0 20px rgba(100,200,255,0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(100,200,255,0.1);
            box-shadow: 0 0 30px rgba(100,200,255,0.4);
            transform: translateY(-2px);
        }
        
        /* 特性卡片 */
        .features {
            position: fixed;
            bottom: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
            z-index: 50;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .feature-card {
            backdrop-filter: blur(20px);
            background: rgba(45,53,97,0.4);
            border: 1px solid rgba(100,200,255,0.2);
            border-radius: 16px;
            padding: 20px 28px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            transition: all 0.3s ease;
            min-width: 140px;
            text-align: center;
        }
        
        .feature-card:hover {
            background: rgba(45,53,97,0.6);
            border-color: rgba(100,200,255,0.4);
            box-shadow: 0 8px 32px rgba(100,200,255,0.15);
            transform: translateY(-4px);
        }
        
        .feature-icon {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        /* 浮动元素 */
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            z-index: 5;
            animation: float 6s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(100,200,255,0.3), transparent);
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(150,100,255,0.3), transparent);
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }
        
        .orb-3 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(200,150,255,0.3), transparent);
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 4s;
        }
        
        /* 动画 */
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(20px, -20px); }
            66% { transform: translate(-10px, 10px); }
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes glow-text {
            0%, 100% { text-shadow: 0 0 10px rgba(100,200,255,0.3); }
            50% { text-shadow: 0 0 20px rgba(100,200,255,0.6); }
        }
        
        @keyframes pulse-ring {
            0% { 
                box-shadow: 0 0 0 0 rgba(100,200,255,0.7);
            }
            70% { 
                box-shadow: 0 0 0 30px rgba(100,200,255,0);
            }
            100% { 
                box-shadow: 0 0 0 0 rgba(100,200,255,0);
            }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .nav {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-links {
                gap: 20px;
                font-size: 12px;
            }
            
            .features {
                bottom: 20px;
                left: 20px;
                right: 20px;
            }
            
            .hero {
                padding: 20px;
            }
            
            .floating-orb {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 浮动装饰 -->
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    
    <!-- 粒子画布 -->
    <canvas id="canvas"></canvas>
    
    <!-- 导航栏 -->
    <nav class="nav">
        <div class="nav-logo">✦ NEXUS</div>
        <ul class="nav-links">
            <li><a href="#features">特性</a></li>
            <li><a href="#about">关于</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
    </nav>
    
    <!-- 主容器 -->
    <div class="container">
        <div class="hero">
            <h1 class="hero-title">创造未来</h1>
            <p class="hero-subtitle">Nexus · 互联未来</p>
            <p class="hero-description">
                探索无限可能的数字世界。我们致力于创造卓越的用户体验和创新的解决方案，
                让您的梦想在我们的平台上闪耀绽放。
            </p>
            <div class="button-group">
                <button class="btn btn-primary">开始探索</button>
                <button class="btn btn-secondary">了解更多</button>
            </div>
        </div>
    </div>
    
    <!-- 特性卡片 -->
    <div class="features">
        <div class="feature-card">
            <div class="feature-icon">⚡</div>
            <div>超高性能</div>
        </div>
        <div class="feature-card">
            <div class="feature-icon">🎨</div>
            <div>创意设计</div>
        </div>
        <div class="feature-card">
            <div class="feature-icon">🔒</div>
            <div>安全可靠</div>
        </div>
        <div class="feature-card">
            <div class="feature-icon">🌐</div>
            <div>全球覆盖</div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dpr = Math.max(1, window.devicePixelRatio || 1);

        function resize() {
            dpr = Math.max(1, window.devicePixelRatio || 1);
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        let clicks = [];
        
        const BASE_COUNT = 180; // 增加粒子数量

        const pointer = { x: null, y: null, active: false };
        window.addEventListener('mousemove', (e) => { 
            pointer.x = e.clientX; 
            pointer.y = e.clientY; 
            pointer.active = true; 
        });
        window.addEventListener('mouseleave', () => { 
            pointer.x = null; 
            pointer.y = null; 
            pointer.active = false; 
        });
        
        // 点击效果
        window.addEventListener('click', (e) => {
            clicks.push({
                x: e.clientX,
                y: e.clientY,
                age: 0,
                maxAge: 40
            });
        });

        class Particle {
            constructor(w, h) {
                this.reset(w, h);
            }
            reset(w, h){
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                const speed = 0.15 + Math.random() * 1.5;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 0.8 + Math.random() * 3.2;
                this.baseSize = this.size;
                
                // 多色彩方案
                const hueOptions = [200, 280, 240, 160];
                this.h = hueOptions[Math.floor(Math.random() * hueOptions.length)] + (Math.random() - 0.5) * 20;
                this.s = 80 + Math.random() * 20;
                this.l = 50 + Math.random() * 15;
                this.opacity = 0.5 + Math.random() * 0.5;
                this.pulse = Math.random() * Math.PI * 2;
            }
            update(w, h){
                // 位移
                this.x += this.vx;
                this.y += this.vy;

                // 脉冲效果
                this.pulse += 0.02;
                this.size = this.baseSize + Math.sin(this.pulse) * 0.5;

                // 边界包裹
                if (this.x < -10) this.x = w + 10;
                if (this.x > w + 10) this.x = -10;
                if (this.y < -10) this.y = h + 10;
                if (this.y > h + 10) this.y = -10;

                // 鼠标交互 - 增强效果
                if (pointer.active && pointer.x != null) {
                    const dx = this.x - pointer.x;
                    const dy = this.y - pointer.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        this.vx += (dx / dist) * 0.8 * force;
                        this.vy += (dy / dist) * 0.8 * force;
                        
                        // 靠近时改变颜色
                        this.l = Math.min(80, this.l + force * 15);
                    }
                }
                
                // 点击吸引效果
                for (let click of clicks) {
                    const dx = this.x - click.x;
                    const dy = this.y - click.y;
                    const dist = Math.hypot(dx, dy);
                    const influence = 100 * (1 - click.age / click.maxAge);
                    
                    if (dist < influence) {
                        const force = (influence - dist) / influence;
                        this.vx -= (dx / dist) * 0.4 * force;
                        this.vy -= (dy / dist) * 0.4 * force;
                    }
                }

                // 阻尼
                this.vx *= 0.993;
                this.vy *= 0.993;
            }
            draw(ctx, globalOpacity){
                ctx.beginPath();
                ctx.fillStyle = `hsla(${this.h}, ${this.s}%, ${this.l}%, ${this.opacity * globalOpacity})`;
                ctx.shadowColor = `hsla(${this.h}, ${this.s}%, ${this.l}%, 0.9)`;
                ctx.shadowBlur = Math.min(40, this.size * 8);
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init(){
            const area = window.innerWidth * window.innerHeight;
            const count = Math.max(60, Math.floor(BASE_COUNT * Math.sqrt(area / (1366*768))));
            particles = new Array(count).fill().map(()=> new Particle(window.innerWidth, window.innerHeight));
        }

        function animate(){
            // 尾迹效果
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(10,14,39,0.08)';
            ctx.fillRect(0,0,canvas.width/dpr,canvas.height/dpr);

            // 加法混合以获得发光效果
            ctx.globalCompositeOperation = 'lighter';

            const w = window.innerWidth, h = window.innerHeight;
            
            // 更新和绘制粒子
            for(let i=0;i<particles.length;i++){
                const p = particles[i];
                p.update(w,h);
                p.draw(ctx, 0.9);
            }

            // 绘制连接线 - 增强效果
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = 0.8;
            for(let i=0;i<particles.length;i++){
                const a = particles[i];
                for(let j=i+1;j<particles.length && j<i+10;j++){
                    const b = particles[j];
                    const dx = a.x - b.x, dy = a.y - b.y;
                    const dist = Math.hypot(dx,dy);
                    if(dist < 140){
                        const alpha = (1 - dist/140) * 0.12;
                        // 使用彩色线条
                        const colorMix = `hsla(${(a.h + b.h) / 2}, 80%, 60%, ${alpha})`;
                        ctx.strokeStyle = colorMix;
                        ctx.beginPath(); 
                        ctx.moveTo(a.x,a.y); 
                        ctx.lineTo(b.x,b.y); 
                        ctx.stroke();
                    }
                }
            }
            
            // 绘制点击涟漪
            ctx.globalCompositeOperation = 'source-over';
            for (let i = clicks.length - 1; i >= 0; i--) {
                const click = clicks[i];
                click.age++;
                
                if (click.age >= click.maxAge) {
                    clicks.splice(i, 1);
                } else {
                    const progress = click.age / click.maxAge;
                    const radius = 30 + progress * 80;
                    const alpha = (1 - progress) * 0.3;
                    
                    ctx.strokeStyle = `hsla(200, 100%, 60%, ${alpha})`;
                    ctx.lineWidth = 2 * (1 - progress);
                    ctx.beginPath();
                    ctx.arc(click.x, click.y, radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
