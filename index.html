<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Effect</title>
    <style>
        :root{
            --bg1:#0f2027;
            --bg2:#203a43;
            --bg3:#2c5364;
            --accent: 200, 90%, 60%;
        }
        html, body { height:100%; margin:0; }
        body {
            background: radial-gradient(ellipse at 10% 10%, rgba(255,255,255,0.03), transparent 10%), linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
            overflow: hidden;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
        }
        canvas {
            display:block;
            width:100%;
            height:100%;
        }
        .overlay{position:fixed;left:20px;top:20px;color:rgba(255,255,255,0.85);font-size:14px}
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dpr = Math.max(1, window.devicePixelRatio || 1);

        function resize() {
            dpr = Math.max(1, window.devicePixelRatio || 1);
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        
        const BASE_COUNT = 120; // base for medium screens

        const pointer = { x: null, y: null, active: false };
        window.addEventListener('mousemove', (e) => { pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true; });
        window.addEventListener('mouseleave', () => { pointer.x = null; pointer.y = null; pointer.active = false; });

        class Particle {
            constructor(w, h) {
                this.reset(w, h);
            }
            reset(w, h){
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                const speed = 0.2 + Math.random() * 1.2;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 0.8 + Math.random() * 3.2;
                this.h = (200 + Math.random() * 140) % 360;
                this.s = 80;
                this.l = 55;
            }
            update(w,h){
                // subtle drift
                this.x += this.vx;
                this.y += this.vy;

                // bounds wrap for continuity
                if (this.x < -10) this.x = w + 10;
                if (this.x > w + 10) this.x = -10;
                if (this.y < -10) this.y = h + 10;
                if (this.y > h + 10) this.y = -10;

                // pointer interaction
                if (pointer.active && pointer.x != null) {
                    const dx = this.x - pointer.x;
                    const dy = this.y - pointer.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 120) {
                        const force = (120 - dist) / 120;
                        this.vx += (dx / dist) * 0.6 * force;
                        this.vy += (dy / dist) * 0.6 * force;
                    }
                }

                // slow damping
                this.vx *= 0.995;
                this.vy *= 0.995;
            }
            draw(ctx){
                ctx.beginPath();
                ctx.fillStyle = `hsl(${this.h}, ${this.s}%, ${this.l}%)`;
                ctx.shadowColor = `hsla(${this.h}, ${this.s}%, ${this.l}%, 0.9)`;
                ctx.shadowBlur = Math.min(30, this.size * 6);
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init(){
            const area = window.innerWidth * window.innerHeight;
            const count = Math.max(40, Math.floor(BASE_COUNT * Math.sqrt(area / (1366*768))));
            particles = new Array(count).fill().map(()=> new Particle(window.innerWidth, window.innerHeight));
        }

        function animate(){
            // trail effect
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(8,12,16,0.12)';
            ctx.fillRect(0,0,canvas.width/dpr,canvas.height/dpr);

            // additive glow for particles
            ctx.globalCompositeOperation = 'lighter';

            const w = window.innerWidth, h = window.innerHeight;
            for(let i=0;i<particles.length;i++){
                const p = particles[i];
                p.update(w,h);
                p.draw(ctx);
            }

            // draw connecting lines
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = 0.6;
            for(let i=0;i<particles.length;i++){
                const a = particles[i];
                for(let j=i+1;j<particles.length && j<i+8;j++){
                    const b = particles[j];
                    const dx = a.x - b.x, dy = a.y - b.y;
                    const dist = Math.hypot(dx,dy);
                    if(dist < 120){
                        ctx.strokeStyle = `rgba(255,255,255,${(1 - dist/120) * 0.08})`;
                        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
